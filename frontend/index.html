  const QUALIFIER_OPTIONS = {
    finishLevel:     ["Budget","Mid-Range","High-End"],
    demoScope:       ["Cosmetic","Partial","Full Gut"],
    homeAge:         ["New Construction (post-2000)","Modern (1981-2000)","Mid-Century (1961-1980)","Older (1941-1960)","Historic (pre-1941)"],
    cabinetType:     ["Stock","Semi-Custom","Custom"],
    materialStorage: ["On-Site","Off-Site"],

  };

    layoutChange:"Layout Change", homeAge:"Home Age", cabinetType:"Cabinet Type",

  };

  const homeAgeShort = a => {
    if (!a) return null;
    if (a.startsWith('New'))      return 'New Build';
    if (a.startsWith('Modern'))   return 'Modern';
    if (a.startsWith('Mid'))      return 'Mid-Century';
    if (a.startsWith('Older'))    return 'Pre-1961';
    if (a.startsWith('Historic')) return 'Historic';
    return a;
  };

  // ── API ──────────────────────────────────────────────────────────────────────
  async function api(endpoint, body=null, method=null) {
    const m = method || (body ? 'POST' : 'GET');
    const res = await fetch(API_URL + endpoint, {
      method: m,
      headers: { 'Content-Type': 'application/json' },
      ...(body ? { body: JSON.stringify(body) } : {}),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
  }

  function compressImage(file) {
    return new Promise(resolve => {
      if (file.type === 'application/pdf') { resolve(file); return; }
      const img = new Image();
      img.onload = () => {
        const MAX=1800; let w=img.width, he=img.height;
        if (w>MAX||he>MAX) { if(w>he){he=Math.round(he*MAX/w);w=MAX;}else{w=Math.round(w*MAX/he);he=MAX;} }
        const c=document.createElement('canvas'); c.width=w; c.height=he;
        c.getContext('2d').drawImage(img,0,0,w,he);
        c.toBlob(resolve,'image/jpeg',0.82);
      };
      img.src=URL.createObjectURL(file);
    });
  }

  // ── Helpers ──────────────────────────────────────────────────────────────────
  const variance    = (e,a)=>(((a-e)/e)*100).toFixed(1);
  const avgVariance = (jobs,f)=>{ const v=jobs.filter(j=>j.status==="Complete").map(j=>((j[`act${f}`]-j[`est${f}`])/j[`est${f}`])*100); return (v.reduce((a,b)=>a+b,0)/v.length).toFixed(1); };
  const fmt     = n=>n>=1000?`$${(n/1000).toFixed(1)}k`:`$${n}`;
  const fmtFull = n=>`$${n.toLocaleString()}`;
  const fmtDate = s=>{ try{ return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }catch{ return s; }};

  function qualBadgeLabel(field, value) {
    if (field === 'layoutChange') {
      if (value === true)  return 'Layout Changed';
      if (value === false) return 'No Layout Change';
      return '—';
    }
    return value ?? '—';
  }

  function getMatchedComps(jobs, form) {
    const sameType = jobs.filter(j => j.type === form.type && j.status === 'Complete');
    if (!sameType.length) return { comps:[], exactCount:0, total:0, relaxed:false };
    const hardMatch = j => {
      if (form.finishLevel !== null && j.finishLevel !== form.finishLevel) return false;
      if (form.demoScope   !== null && j.demoScope   !== form.demoScope)   return false;
      return true;
    };
    const softScore = j => {
      let s = 0;
      if (form.layoutChange    !== null && j.layoutChange    === form.layoutChange)    s++;
      if (form.homeAge         !== null && j.homeAge         === form.homeAge)          s++;
      if (form.materialStorage !== null && j.materialStorage === form.materialStorage)  s++;
      if (form.siteAccess      !== null && j.siteAccess      === form.siteAccess)       s++;
      if (form.type === 'Kitchen Remodel' && form.cabinetType !== null && j.cabinetType === form.cabinetType) s++;
      return s;
    };
    const exact = sameType.filter(hardMatch);
    if (exact.length >= 2) {
      return { comps:[...exact].sort((a,b)=>softScore(b)-softScore(a)), exactCount:exact.length, total:sameType.length, relaxed:false };
    }
    const scored = [...sameType].map(j=>({...j, _score:(hardMatch(j)?10:0)+softScore(j)}));
    return { comps:scored.sort((a,b)=>b._score-a._score), exactCount:exact.length, total:sameType.length, relaxed:true };
  }

  // ── Styles ───────────────────────────────────────────────────────────────────

    btn:         { padding:"9px 18px", borderRadius:6, border:"none", cursor:"pointer", fontSize:13, fontWeight:500, transition:"all 0.15s" },

  // ── Icon ─────────────────────────────────────────────────────────────────────
  const Icon = ({name,size=16,color="currentColor"})=>{
    const p={
      dashboard:"M3 3h8v8H3V3zm10 0h8v8h-8V3zm0 10h8v8h-8v-8zM3 13h8v8H3v-8z",

  // ── CompCard ──────────────────────────────────────────────────────────────────
  function CompCard({ job, form }) {
    const fields = [
      'finishLevel','demoScope','homeAge','layoutChange',
      ...(job.cabinetType     != null ? ['cabinetType']     : []),
      ...(job.materialStorage != null ? ['materialStorage'] : []),
      ...(job.siteAccess      != null ? ['siteAccess']      : []),
    ];
    const diffs = fields.filter(f => form[f] !== null && job[f] !== form[f]);
    const tagBase     = { padding:'2px 7px', borderRadius:3, fontSize:10, fontWeight:500, display:'inline-block' };
    const tagMatch    = { ...tagBase, background:'#1C2127', color:'#6B7A94', border:'1px solid #2A3040' };
    const tagMismatch = { ...tagBase, background:'rgba(212,130,42,0.15)', color:'#D4822A', border:'1px solid rgba(212,130,42,0.35)' };
    return html`
      <div style=${{ background:'#1A2028', border:'1px solid #2A3040', borderRadius:8, padding:'14px 16px' }}>
        <div style=${{ fontSize:12, color:'#E8E4DC', fontWeight:500, marginBottom:2 }}>${job.name}</div>
        <div style=${{ fontSize:11, color:'#5A6478', marginBottom:8 }}>${fmtDate(job.date)} · ${job.sqft} sqft</div>
        <div style=${{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:10 }}>
          ${fields.map(f => html`<span key=${f} style=${diffs.includes(f) ? tagMismatch : tagMatch}>${qualBadgeLabel(f, job[f])}</span>`)}
        </div>
        <div style=${{ display:'flex', gap:20, marginBottom: diffs.length ? 8 : 0 }}>
          <div>
            <div style=${{ fontSize:10, color:'#5A6478', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:2 }}>Act. Hours</div>
            <div style=${{ fontFamily:"'IBM Plex Mono',monospace", fontSize:17, fontWeight:700, color:'#E8E4DC' }}>${job.actHours}</div>
          </div>
          <div>
            <div style=${{ fontSize:10, color:'#5A6478', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:2 }}>Act. Materials</div>
            <div style=${{ fontFamily:"'IBM Plex Mono',monospace", fontSize:17, fontWeight:700, color:'#E8E4DC' }}>${fmt(job.actMaterials)}</div>
          </div>
        </div>
        ${diffs.length > 0 && html`
          <div style=${{ fontSize:11, color:'#D4822A', background:'rgba(212,130,42,0.08)', borderRadius:4, padding:'5px 8px' }}>
            Differs: ${diffs.map(f => QUAL_LABELS[f]).join(', ')}
          </div>`}
      </div>`;
  }

  // ── NewProjectModal ───────────────────────────────────────────────────────────
  function NewProjectModal({ onClose, onCreate }) {
    const [form,    setForm]    = useState({ name:'', address:'', type:'Kitchen Remodel', sqft:'' });
    const [loading, setLoading] = useState(false);
    const [error,   setError]   = useState(null);
    const set = (k,v) => setForm(f=>({...f,[k]:v}));
    const submit = async () => {
      if (!form.name.trim()) { setError('Project name is required.'); return; }
      setLoading(true);
      try { const p = await api('/projects', form); onCreate(p); }
      catch(e) { setError(e.message); }
      setLoading(false);
    };
    return html`
      <div style=${{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}
        onClick=${e=>{ if(e.target===e.currentTarget) onClose(); }}>
        <div style=${{background:'#222831',border:'1px solid #2A3040',borderRadius:12,padding:32,width:440}}>
          <div style=${{fontSize:15,fontWeight:600,color:'#E8E4DC',marginBottom:24}}>New Project</div>
          <div style=${{marginBottom:14}}>
            <label style=${S.label}>Project Name *</label>
            <input style=${S.input} placeholder="e.g. Smith Kitchen Remodel" value=${form.name} onInput=${e=>set('name',e.target.value)} />
          </div>
          <div style=${{marginBottom:14}}>
            <label style=${S.label}>Address / Customer</label>
            <input style=${S.input} placeholder="e.g. 123 Maple St" value=${form.address} onInput=${e=>set('address',e.target.value)} />
          </div>
          <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
            <div>
              <label style=${S.label}>Job Type</label>
              <select style=${S.select} value=${form.type} onChange=${e=>set('type',e.target.value)}>
                ${JOB_TYPES.map(t=>html`<option key=${t}>${t}</option>`)}
              </select>
            </div>
            <div>
              <label style=${S.label}>Square Footage</label>
              <input style=${S.input} type="number" placeholder="e.g. 320" value=${form.sqft} onInput=${e=>set('sqft',e.target.value)} />
            </div>
          </div>
          ${error && html`<div style=${{color:'#E05252',fontSize:12,marginBottom:12}}>${error}</div>`}
          <div style=${{display:'flex',gap:10,justifyContent:'flex-end',marginTop:8}}>
            <button style=${{...S.btn,...S.btnSecondary}} onClick=${onClose}>Cancel</button>
            <button style=${{...S.btn,...S.btnPrimary}} onClick=${submit} disabled=${loading}>
              ${loading ? 'Creating…' : 'Create Project'}
            </button>
          </div>
        </div>
      </div>`;
  }

  // ── ProjectsList ──────────────────────────────────────────────────────────────
  function ProjectsList({ onOpen }) {
    const [projects,  setProjects]  = useState([]);
    const [loading,   setLoading]   = useState(true);
    const [showModal, setShowModal] = useState(false);
    const load = async () => {
      setLoading(true);
      try { setProjects(await api('/projects')); } catch(e) { console.error(e); }
      setLoading(false);
    };
    useEffect(() => { load(); }, []);
    const onCreate = p => { setProjects(prev=>[p,...prev]); setShowModal(false); onOpen(p); };
    return html`
      <div>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style=${{fontSize:13,color:'#5A6478'}}>${projects.length} project${projects.length!==1?'s':''}</div>
          <button style=${{...S.btn,...S.btnPrimary,display:'flex',alignItems:'center',gap:8}} onClick=${()=>setShowModal(true)}>
            <${Icon} name="plus" size=${14} color="#fff" /> New Project
          </button>
        </div>
        ${loading && html`<div style=${{color:'#5A6478',fontSize:13,padding:'40px 0',textAlign:'center'}}>Loading projects…</div>`}
        ${!loading && projects.length===0 && html`
          <div style=${{...S.card,textAlign:'center',padding:'60px 24px'}}>
            <div style=${{fontSize:32,marginBottom:12}}>📋</div>
            <div style=${{color:'#5A6478',fontSize:13,lineHeight:1.8}}>
              No projects yet.<br/>
              <strong style=${{color:'#D4822A'}}>Create a project</strong> to start reading drawings and generating estimates.
            </div>
          </div>`}
        ${!loading && projects.map(p=>html`
          <div key=${p.projectId}
            onClick=${()=>onOpen(p)}
            style=${{...S.card,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 20px',marginBottom:10,transition:'border-color 0.15s'}}
            onMouseEnter=${e=>e.currentTarget.style.borderColor='#4A5568'}
            onMouseLeave=${e=>e.currentTarget.style.borderColor='#2A3040'}>

  // ── DrawingViewer ─────────────────────────────────────────────────────────────
  function DrawingViewer({ fileUrl, isPdf }) {
    const containerRef = useRef(null);
    const dragRef      = useRef(null);
    const [scale,     setScale]     = useState(1);
    const [offset,    setOffset]    = useState({x:0, y:0});
    const [dragging,  setDragging]  = useState(false);

    // Reset view when file changes
    useEffect(() => { setScale(1); setOffset({x:0, y:0}); }, [fileUrl]);

    // Non-passive wheel listener (required to call preventDefault)
    useEffect(() => {
      const el = containerRef.current;
      if (!el || isPdf) return;
      const onWheel = e => {
        e.preventDefault();
        const rect = el.getBoundingClientRect();
        const cx = e.clientX - rect.left - rect.width  / 2;
        const cy = e.clientY - rect.top  - rect.height / 2;
        const factor = e.deltaY < 0 ? 1.12 : 0.893;
        setScale(s => {
          const ns    = Math.min(Math.max(s * factor, 0.08), 14);
          const ratio = ns / s;
          setOffset(o => ({ x: cx + (o.x - cx) * ratio, y: cy + (o.y - cy) * ratio }));
          return ns;
        });
      };
      el.addEventListener('wheel', onWheel, { passive: false });
      return () => el.removeEventListener('wheel', onWheel);
    }, [isPdf, fileUrl]);

    if (!fileUrl) return null;

    if (isPdf) {
      return html`
        <div style=${{height:620, borderRadius:6, overflow:'hidden', border:'1px solid #2A3040', background:'#111'}}>
          <embed src=${fileUrl + '#navpanes=0&view=Fit'} type="application/pdf" width="100%" height="100%" style=${{display:'block'}} />
        </div>`;
    }

    const onMouseDown = e => {
      if (e.button !== 0) return;
      e.preventDefault();
      setDragging(true);
      dragRef.current = { mx: e.clientX, my: e.clientY, ox: offset.x, oy: offset.y };
    };
    const onMouseMove = e => {
      if (!dragging || !dragRef.current) return;
      setOffset({ x: dragRef.current.ox + e.clientX - dragRef.current.mx, y: dragRef.current.oy + e.clientY - dragRef.current.my });
    };
    const onStop = () => { setDragging(false); dragRef.current = null; };

    const ctrlBtn = { background:'rgba(20,25,32,0.9)', border:'1px solid #3A4558', color:'#B8C0CC', cursor:'pointer', borderRadius:4, padding:'5px 12px', fontSize:12, fontWeight:500 };

    return html`
      <div ref=${containerRef}
        style=${{position:'relative', height:580, borderRadius:6, overflow:'hidden', background:'#0F1318', border:'1px solid #2A3040', cursor: dragging ? 'grabbing' : 'grab', userSelect:'none'}}
        onMouseDown=${onMouseDown}
        onMouseMove=${onMouseMove}
        onMouseUp=${onStop}
        onMouseLeave=${onStop}>
        <div style=${{width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', pointerEvents:'none'}}>
          <img
            src=${fileUrl}
            draggable=${false}
            style=${{
              transform: `translate(${offset.x}px, ${offset.y}px) scale(${scale})`,
              transformOrigin: 'center center',
              maxWidth: '96%', maxHeight: '96%',
              display: 'block', userSelect: 'none',
            }}
          />
        </div>
        <div style=${{position:'absolute', bottom:12, right:12, display:'flex', gap:6, alignItems:'center'}}>
          <button style=${ctrlBtn} onClick=${e=>{e.stopPropagation();setScale(s=>Math.min(s*1.25,14));}}>+</button>
          <span style=${{fontFamily:"'IBM Plex Mono',monospace", fontSize:11, color:'#5A6478', minWidth:42, textAlign:'center'}}>${Math.round(scale*100)}%</span>
          <button style=${ctrlBtn} onClick=${e=>{e.stopPropagation();setScale(s=>Math.max(s/1.25,0.08));}}>−</button>
          <button style=${{...ctrlBtn, marginLeft:2}} onClick=${e=>{e.stopPropagation();setScale(1);setOffset({x:0,y:0});}}>Reset</button>
        </div>
        <div style=${{position:'absolute', top:10, left:12, fontSize:10, color:'#3A4558'}}>Scroll to zoom · Drag to pan</div>
      </div>`;
  }

  // ── ProjectDetail ─────────────────────────────────────────────────────────────
  function ProjectDetail({ projectId, onBack, jobs }) {
    const [project,  setProject]  = useState(null);
    const [tab,      setTab]      = useState('drawing');
    const [loading,  setLoading]  = useState(true);

    // Lifted drawing state
    const [drawingResult,   setDrawingResult]   = useState(null);
    const [drawingItems,    setDrawingItems]     = useState([]);
    const [drawingFileUrl,  setDrawingFileUrl]   = useState(null);
    const [drawingFileName, setDrawingFileName]  = useState(null);
    const [drawingIsPdf,    setDrawingIsPdf]     = useState(false);
    const drawingInitialized = useRef(false);

    // Lifted estimate state — always initialized to a valid object
    const [estimateForm,    setEstimateForm]     = useState({
      type:'Kitchen Remodel', sqft:'', desc:'',
      finishLevel:null, demoScope:null, layoutChange:null,
      homeAge:null, cabinetType:null, materialStorage:null, siteAccess:null,
    });
    const [estimateResult,  setEstimateResult]   = useState(null);
    const formInitialized = useRef(false);

    const reload = async () => {
      try {
        const p = await api(`/projects/${projectId}`);
        setProject(p);
        if (!drawingInitialized.current) {
          drawingInitialized.current = true;
          const drawings = Array.isArray(p.drawings) ? p.drawings : [];
          const lastDrawing = drawings.length > 0 ? drawings[drawings.length - 1] : null;
          if (lastDrawing) {
            setDrawingResult(lastDrawing);
            setDrawingItems((lastDrawing.items || []).map((item, i) => ({...item, id:`${lastDrawing.id || 'drawing'}-${i}`})));
            setDrawingFileUrl(lastDrawing.fileUrl || null);
            setDrawingFileName(lastDrawing.fileName || 'Saved drawing');
            setDrawingIsPdf(lastDrawing.mediaType === 'application/pdf' || /\.pdf$/i.test(lastDrawing.fileName || ''));
          }
        }
        if (!formInitialized.current) {
          formInitialized.current = true;
          const ests = p.estimates || [];
          const last = ests.length > 0 ? ests[ests.length - 1] : null;
          setEstimateForm({
            type:            last?.jobType        || p.type || 'Kitchen Remodel',
            sqft:            last?.sqft           || p.sqft || '',
            desc:            last?.desc           || '',
            finishLevel:     last?.finishLevel    ?? null,
            demoScope:       last?.demoScope      ?? null,
            layoutChange:    last?.layoutChange   ?? null,
            homeAge:         last?.homeAge        ?? null,
            cabinetType:     last?.cabinetType    ?? null,
            materialStorage: last?.materialStorage ?? null,
            siteAccess:      last?.siteAccess     ?? null,
          });
          if (last) setEstimateResult(last);
        }
      } catch(e) { console.error(e); }
      setLoading(false);
    };

    useEffect(() => { reload(); }, [projectId]);

    if (loading) return html`<div style=${{color:'#5A6478',fontSize:13,padding:'40px 0',textAlign:'center'}}>Loading project…</div>`;
    if (!project) return html`<div style=${{color:'#E05252',fontSize:13}}>Project not found.</div>`;

    const tabs = [
      { id:'drawing',  label:'Read Drawing' },
      { id:'estimate', label:'Estimate' },
    ];

    return html`
      <div>
        <div style=${{marginBottom:20}}>
          <button style=${{...S.btn,...S.btnGhost,display:'flex',alignItems:'center',gap:8,marginBottom:16,padding:'6px 12px',fontSize:12}} onClick=${onBack}>
            <${Icon} name="back" size=${13} color="#6B7A94" /> All Projects
          </button>
          <div style=${{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
            <div>
              <div style=${{fontSize:20,fontWeight:600,color:'#E8E4DC',marginBottom:6}}>${project.name}</div>
              <div style=${{fontSize:13,color:'#5A6478'}}>
                <span style=${S.badge(project.type)}>${project.type}</span>
                ${project.sqft   ? html`<span style=${{marginLeft:10}}>${project.sqft} sqft</span>` : ''}
                ${project.address? html`<span style=${{marginLeft:10}}>${project.address}</span>` : ''}
                <span style=${{marginLeft:10}}>Created ${fmtDate(project.createdAt)}</span>
              </div>
            </div>
            <span style=${S.badge(project.status)}>${project.status}</span>
          </div>
        </div>

        <div style=${{display:'flex',gap:4,marginBottom:20,borderBottom:'1px solid #2A3040'}}>
          ${tabs.map(t=>html`
            <button key=${t.id} onClick=${()=>setTab(t.id)}
              style=${{...S.btn,padding:'8px 18px',borderRadius:'6px 6px 0 0',fontSize:13,
                background:tab===t.id?'#222831':'transparent',
                color:tab===t.id?'#E8E4DC':'#5A6478',
                borderBottom:tab===t.id?'2px solid #D4822A':'2px solid transparent',
                marginBottom:'-1px'}}>
              ${t.label}
            </button>`)}
        </div>

        ${tab==='drawing' && html`<${DrawingTab}
          project=${project} onSaved=${reload}
          currentResult=${drawingResult}   setCurrentResult=${setDrawingResult}
          currentItems=${drawingItems}     setCurrentItems=${setDrawingItems}
          currentFileUrl=${drawingFileUrl} setCurrentFileUrl=${setDrawingFileUrl}
          currentFileName=${drawingFileName} setCurrentFileName=${setDrawingFileName}
          currentIsPdf=${drawingIsPdf}    setCurrentIsPdf=${setDrawingIsPdf}
        />`}
        ${tab==='estimate' && html`<${EstimateTab}
          project=${project} onSaved=${reload} jobs=${jobs}
          form=${estimateForm}     setForm=${setEstimateForm}
          result=${estimateResult} setResult=${setEstimateResult}
        />`}
      </div>`;
  }

  // ── DrawingTab ────────────────────────────────────────────────────────────────
  function DrawingTab({ project, onSaved,
    currentResult, setCurrentResult, currentItems, setCurrentItems,
    currentFileUrl, setCurrentFileUrl, currentFileName, setCurrentFileName,
    currentIsPdf, setCurrentIsPdf,
  }) {
    const [fileData,  setFileData]  = useState(null);
    const [loading,   setLoading]   = useState(false);
    const [saved,     setSaved]     = useState(false);
    const [error,     setError]     = useState(null);
    const [dragging,  setDragging]  = useState(false);
    const [expanded,  setExpanded]  = useState({});
    const fileInputRef = useRef(null);

    const handleFile = async f => {
      if (!f) return;
      setCurrentResult(null); setCurrentItems([]); setError(null); setSaved(false); setFileData(null);
      if (currentFileUrl) URL.revokeObjectURL(currentFileUrl);
      const compressed = await compressImage(f);
      const isPdf = compressed.type === 'application/pdf';
      setCurrentIsPdf(isPdf);
      setCurrentFileName(f.name || (isPdf ? 'drawing.pdf' : 'drawing.jpg'));
      const objUrl = URL.createObjectURL(compressed);
      setCurrentFileUrl(objUrl);
      const reader = new FileReader();
      reader.onload = e => setFileData({ base64: e.target.result.split(',')[1], mediaType: compressed.type });
      reader.readAsDataURL(compressed);
    };

    const readDrawing = async () => {
      if (!fileData) return;
      setLoading(true); setError(null);
      try {
        const r = await api('/read-drawing', { fileData: fileData.base64, mediaType: fileData.mediaType });
        if (!Array.isArray(r?.items)) throw new Error('Drawing analysis returned an invalid material list. Please retry.');
        setCurrentResult(r);
        setCurrentItems(r.items.map((it,i)=>({...it,id:i})));
        await api(`/projects/${project.projectId}/drawing`, {
          ...r,
          items: r.items,
          fileName: currentFileName || 'drawing',
          fileData: fileData.base64,
          mediaType: fileData.mediaType,
        });
        setSaved(true);
        onSaved();
      } catch(e) { setError(e.message); }
      setLoading(false);
    };

    const updateItem = (id,f,v) => setCurrentItems(p=>p.map(it=>it.id===id?{...it,[f]:v}:it));
    const addItem    = ()       => setCurrentItems(p=>[...p,{id:Date.now(),description:'',spec:'',quantity:null,unit:'ea',notes:''}]);
    const removeItem = id       => setCurrentItems(p=>p.filter(it=>it.id!==id));

    const confColor  = { high:'#3AAFA9', medium:'#D4822A', low:'#E05252' };
    const savedDrawings = [...(project.drawings||[])].reverse();

    // ── No file loaded yet: show full dropzone ────────────────────────────────
    if (!currentFileUrl && !currentResult) {
      return html`
        <div>
          <div style=${{maxWidth:480,margin:'0 auto'}}>
            <div style=${S.card}>
              <div style=${S.cardTitle}>Upload Drawing</div>
              <label style=${{...S.dropzone,borderColor:dragging?'#D4822A':'#2A3040',background:dragging?'rgba(212,130,42,0.05)':'transparent'}}
                onDragOver=${e=>{e.preventDefault();setDragging(true)}}
                onDragLeave=${()=>setDragging(false)}
                onDrop=${e=>{e.preventDefault();setDragging(false);handleFile(e.dataTransfer.files[0])}}>
                <input type="file" accept="image/*,.pdf" style=${{display:'none'}} onChange=${e=>handleFile(e.target.files[0])} />
                <div style=${{fontSize:36,marginBottom:10}}>📐</div>
                <div style=${{fontSize:14,color:'#B8C0CC',marginBottom:4}}>Drop a photo or PDF here</div>
                <div style=${{fontSize:12,color:'#5A6478'}}>or click to browse · JPG, PNG, HEIC, PDF</div>
              </label>
              ${error && html`<div style=${{color:'#E05252',fontSize:12,marginTop:12}}>${error}</div>`}
            </div>
          </div>
          ${savedDrawings.length > 0 && html`<${SavedDrawingsList} drawings=${savedDrawings} expanded=${expanded} setExpanded=${setExpanded} confColor=${confColor} />`}
        </div>`;
    }

    // ── File loaded: compact bar + viewer + material list ─────────────────────
    return html`
      <div>
        <!-- Compact top bar -->
        <div style=${{display:'flex',alignItems:'center',gap:10,marginBottom:16,padding:'10px 14px',background:'#1A2028',borderRadius:6,border:'1px solid #2A3040',flexWrap:'wrap'}}>
          <button
            style=${{...S.btn,...S.btnSecondary,padding:'6px 12px',fontSize:12,display:'flex',alignItems:'center',gap:6,flexShrink:0}}
            onClick=${()=>fileInputRef.current?.click()}>
            <${Icon} name="upload" size=${13} color="#B8C0CC" /> New Drawing
          </button>
          <input ref=${fileInputRef} type="file" accept="image/*,.pdf" style=${{display:'none'}} onChange=${e=>handleFile(e.target.files[0])} />

          <div style=${{display:'flex',alignItems:'center',gap:8,overflow:'hidden',flex:1,minWidth:0}}>
            <span style=${{fontSize:12,color:'#E8E4DC',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              ${currentFileName}
            </span>
            ${currentFileUrl && html`<a href=${currentFileUrl} download=${currentFileName}
              style=${{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#D4822A',textDecoration:'none',flexShrink:0,
                       padding:'3px 8px',background:'rgba(212,130,42,0.12)',borderRadius:4,border:'1px solid rgba(212,130,42,0.3)'}}>
              <${Icon} name="download" size=${11} color="#D4822A" /> Download
            </a>`}
          </div>

          ${currentResult && html`
            <div style=${{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
              <span style=${{fontSize:12,color:'#5A6478'}}>${currentResult.jobType}</span>
              <span style=${{fontSize:11,padding:'2px 8px',borderRadius:4,background:'#1C2127',color:confColor[currentResult.confidence]||'#6B7A94'}}>
                ${currentResult.confidence} confidence
              </span>
              ${saved && html`<span style=${{fontSize:11,color:'#3AAFA9'}}>✓ Saved</span>`}
            </div>`}

          ${!currentResult && html`
            <button style=${{...S.btn,...S.btnPrimary,padding:'6px 16px',fontSize:12,flexShrink:0}} onClick=${readDrawing} disabled=${!fileData||loading}>
              ${loading ? 'Reading…' : 'Extract Material List'}
            </button>`}
          ${error && html`<span style=${{fontSize:12,color:'#E05252'}}>${error}</span>`}
        </div>

        <!-- Drawing viewer: full width -->
        <${DrawingViewer} fileUrl=${currentFileUrl} isPdf=${currentIsPdf} />
        ${currentResult && !currentFileUrl && html`
          <div style=${{...S.card,textAlign:'center',padding:'24px',marginBottom:16,color:'#6B7A94',fontSize:12,lineHeight:1.6}}>
            This saved drawing predates file storage, so its material table is restored but the original image is unavailable.
          </div>`}
        ${currentResult?.drawingNotes && html`
          <div style=${{marginTop:8,marginBottom:16,fontSize:12,color:'#6B7A94',lineHeight:1.6,background:'#1A2028',borderRadius:6,padding:'10px 14px',border:'1px solid #2A3040'}}>
            ${currentResult.drawingNotes}
          </div>`}

        <!-- Status messages when no result yet -->
        ${!currentResult && !loading && html`
          <div style=${{...S.card,textAlign:'center',padding:'32px 24px',marginTop:16}}>
            <div style=${{fontSize:24,marginBottom:10}}>📋</div>
            <div style=${{color:'#5A6478',fontSize:13,lineHeight:1.7,marginBottom:16}}>
              Drawing loaded. Click <strong style=${{color:'#D4822A'}}>Extract Material List</strong> to analyze.
            </div>
            <button style=${{...S.btn,...S.btnPrimary,padding:'10px 32px'}} onClick=${readDrawing} disabled=${!fileData||loading}>
              Extract Material List
            </button>
            ${error && html`<div style=${{color:'#E05252',fontSize:12,marginTop:10}}>${error}</div>`}
          </div>`}
        ${loading && html`
          <div style=${{...S.card,textAlign:'center',padding:'32px 24px',marginTop:16}}>
            <div style=${{fontSize:13,color:'#6B7A94'}}>Reading drawing… usually 5–10 seconds</div>
          </div>`}

        <!-- Material list: full width below viewer -->
        ${currentResult && html`
          <div style=${{...S.card,marginTop:16}}>
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div style=${S.cardTitle}>Materials · ${currentItems.length} items</div>
              <button style=${{...S.btn,...S.btnSecondary,padding:'5px 12px',fontSize:12,display:'flex',alignItems:'center',gap:6}} onClick=${addItem}>
                <${Icon} name="plus" size=${12} color="#B8C0CC" /> Add Row
              </button>
            </div>
            <div style=${{overflowX:'auto'}}>
              <table style=${{...S.table,tableLayout:'fixed'}}>
                <colgroup>
                  <col style=${{width:'22%'}}/><col style=${{width:'18%'}}/><col style=${{width:'7%'}}/><col style=${{width:'7%'}}/><col style=${{width:'42%'}}/><col style=${{width:'4%'}}/>
                </colgroup>
                <thead><tr>${['Description','Spec / Product Code','Qty','Unit','Notes',''].map(h=>html`<th key=${h} style=${S.th}>${h}</th>`)}</tr></thead>
                <tbody>
                  ${currentItems.map(it=>html`
                    <tr key=${it.id}>
                      <td style=${S.td}><input style=${S.inputSm} value=${it.description||''} onInput=${e=>updateItem(it.id,'description',e.target.value)} /></td>
                      <td style=${S.td}><input style=${{...S.inputSm,fontFamily:"'IBM Plex Mono',monospace",fontSize:11}} value=${it.spec||''} onInput=${e=>updateItem(it.id,'spec',e.target.value)} /></td>
                      <td style=${S.td}><input style=${{...S.inputSm,textAlign:'right'}} type="number" value=${it.quantity??''} placeholder="—" onInput=${e=>updateItem(it.id,'quantity',e.target.value===''?null:parseFloat(e.target.value))} /></td>
                      <td style=${S.td}>
                        <select style=${{...S.inputSm,padding:'6px 4px'}} value=${it.unit||'ea'} onChange=${e=>updateItem(it.id,'unit',e.target.value)}>
                          ${UNITS.map(u=>html`<option key=${u}>${u}</option>`)}
                        </select>
                      </td>
                      <td style=${S.td}><input style=${{...S.inputSm,color:'#8A9BB0'}} value=${it.notes||''} onInput=${e=>updateItem(it.id,'notes',e.target.value)} /></td>
                      <td style=${{...S.td,textAlign:'center',padding:'6px'}}>
                        <button onClick=${()=>removeItem(it.id)} style=${{background:'none',border:'none',cursor:'pointer',padding:4,lineHeight:0}}>
                          <${Icon} name="trash" size=${12} color="#5A6478" />
                        </button>
                      </td>
                    </tr>`)}
                </tbody>
              </table>
            </div>
            <div style=${{marginTop:14,display:'flex',justifyContent:'flex-end'}}>
              <button style=${{...S.btn,...S.btnSecondary,fontSize:12}} onClick=${()=>{
                const csv=['Description,Spec,Qty,Unit,Notes',...currentItems.map(it=>`"${it.description||''}","${it.spec||''}",${it.quantity??''},"${it.unit}","${it.notes||''}"`)].join('\n');
                const a=document.createElement('a'); a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); a.download='material-list.csv'; a.click();
              }}>Export CSV</button>
            </div>
          </div>`}

        <!-- Re-extract button when result is showing -->
        ${currentResult && fileData && html`
          <div style=${{marginBottom:16,display:'flex',gap:10,alignItems:'center'}}>
            <button style=${{...S.btn,...S.btnSecondary,fontSize:12,display:'flex',alignItems:'center',gap:6}} onClick=${readDrawing} disabled=${!fileData||loading}>
              ${loading ? 'Re-reading…' : 'Re-extract Material List'}
            </button>
            <span style=${{fontSize:12,color:'#3A4558'}}>Re-run analysis on the current drawing</span>
          </div>`}

        <!-- Saved drawings history -->
        ${savedDrawings.length > 0 && html`<${SavedDrawingsList} drawings=${savedDrawings} expanded=${expanded} setExpanded=${setExpanded} confColor=${confColor} />`}
      </div>`;
  }

  // ── SavedDrawingsList ─────────────────────────────────────────────────────────
  function SavedDrawingsList({ drawings, expanded, setExpanded, confColor }) {
    return html`
      <div style=${S.card}>
        <div style=${S.cardTitle}>Saved Drawings (${drawings.length})</div>
        ${drawings.map((d,i)=>html`
          <div key=${d.id||i} style=${{borderBottom: i < drawings.length-1 ? '1px solid #1C2127' : 'none', paddingBottom:10, marginBottom:10}}>
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}
              onClick=${()=>setExpanded(p=>({...p,[i]:!p[i]}))}>
              <div>
                <div style=${{fontSize:12,color:'#E8E4DC',fontWeight:500}}>${d.fileName || d.jobType || 'Drawing'}</div>
                <div style=${{fontSize:11,color:'#5A6478',marginTop:2}}>
                  ${fmtDate(d.savedAt)} · ${(d.items||[]).length} items
                  ${d.confidence ? html` · <span style=${{color:confColor[d.confidence]||'#6B7A94'}}>${d.confidence}</span>` : ''}
                </div>
              </div>
              <span style=${{fontSize:11,color:'#5A6478'}}>${expanded[i]?'▲':'▼'}</span>
            </div>
            ${expanded[i] && html`

  // ── EstimateTab ───────────────────────────────────────────────────────────────
  function EstimateTab({ project, onSaved, jobs, form, setForm, result, setResult }) {
    const [loading, setLoading] = useState(false);
    const [saved,   setSaved]   = useState(false);
    const [error,   setError]   = useState(null);

    const set     = (k,v) => setForm(f=>({...f,[k]:v}));
    const setType = v     => setForm(f=>({...f, type:v, cabinetType:null}));

    const qualFields = [
      'finishLevel','demoScope','layoutChange','homeAge',
      ...(form.type==='Kitchen Remodel'?['cabinetType']:[]),
      'materialStorage','siteAccess',
    ];
    const activeFilters = qualFields.filter(f => form[f] !== null).length;
    const matchResult   = getMatchedComps(jobs, form);

    const run = async () => {
      if (!form.sqft) { setError('Please enter square footage.'); return; }
      setError(null); setLoading(true); setSaved(false);
      try {
        const qualifiers = {
          finishLevel:form.finishLevel, demoScope:form.demoScope, layoutChange:form.layoutChange,
          homeAge:form.homeAge, cabinetType:form.cabinetType,
          materialStorage:form.materialStorage, siteAccess:form.siteAccess,
        };
        const r = await api('/estimate', {
          type: form.type, sqft: form.sqft, desc: form.desc,
          qualifiers,
          comparableJobs: matchResult.comps.slice(0,8),
          compMatchInfo: { exactCount:matchResult.exactCount, total:matchResult.total, relaxed:matchResult.relaxed },
        });
        setResult(r);
        await api(`/projects/${project.projectId}/estimate`, {
          ...r, jobType:form.type, sqft:form.sqft, desc:form.desc,
          finishLevel:form.finishLevel, demoScope:form.demoScope, layoutChange:form.layoutChange,
          homeAge:form.homeAge, cabinetType:form.cabinetType,
          materialStorage:form.materialStorage, siteAccess:form.siteAccess,
        });
        setSaved(true);
        onSaved();
      } catch(e) { setError(e.message); }
      setLoading(false);
    };

    const selectSm = { ...S.select, padding:'7px 10px', fontSize:12 };
    const savedEstimates = [...(project.estimates||[])].reverse();

    return html`
      <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,alignItems:'start'}}>

        <!-- LEFT: form -->
        <div>
          <div style=${S.card}>
            <div style=${S.cardTitle}>Job Details</div>
            <div style=${{marginBottom:14}}>
              <label style=${S.label}>Job Type</label>
              <select style=${S.select} value=${form.type} onChange=${e=>setType(e.target.value)}>
                ${JOB_TYPES.map(t=>html`<option key=${t}>${t}</option>`)}
              </select>
            </div>
            <div style=${{marginBottom:14}}>
              <label style=${S.label}>Square Footage</label>
              <input style=${S.input} type="number" placeholder="e.g. 320" value=${form.sqft} onInput=${e=>set('sqft',e.target.value)} />
            </div>
            <div style=${{marginBottom:14}}>
              <label style=${S.label}>Scope Notes (optional)</label>
              <textarea style=${{...S.input,height:70,resize:'vertical'}} placeholder="e.g. full gut, new cabinets, LVP flooring…" value=${form.desc} onInput=${e=>set('desc',e.target.value)} />
            </div>

            <div style=${{borderTop:'1px solid #2A3040',paddingTop:14,marginBottom:14}}>
              <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style=${{fontSize:11,color:'#5A6478',letterSpacing:'0.1em',textTransform:'uppercase',fontWeight:600}}>Qualifiers</div>
                ${activeFilters > 0 && html`<div style=${{fontSize:11,color:'#D4822A',fontWeight:500}}>Filtering on ${activeFilters}</div>`}
              </div>
              <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div>
                  <label style=${S.label}>Finish Level</label>
                  <select style=${selectSm} value=${form.finishLevel||''} onChange=${e=>set('finishLevel',e.target.value||null)}>
                    <option value="">Any</option>
                    ${QUALIFIER_OPTIONS.finishLevel.map(v=>html`<option key=${v} value=${v}>${v}</option>`)}
                  </select>
                </div>
                <div>
                  <label style=${S.label}>Demo Scope</label>
                  <select style=${selectSm} value=${form.demoScope||''} onChange=${e=>set('demoScope',e.target.value||null)}>
                    <option value="">Any</option>
                    ${QUALIFIER_OPTIONS.demoScope.map(v=>html`<option key=${v} value=${v}>${v}</option>`)}
                  </select>
                </div>
                <div>
                  <label style=${S.label}>Layout Change</label>
                  <select style=${selectSm} value=${form.layoutChange===null?'':String(form.layoutChange)}

                    <option value="true">Yes — layout changed</option>
                    <option value="false">No — same layout</option>

                </div>
                <div>
                  <label style=${S.label}>Home Age</label>

                    ? html`<span style=${{fontSize:12,color:'#B8C0CC'}}>${matchResult.total} ${form.type}s in history</span>`

                <span style=${{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:'#D4822A'}}>${Math.min(matchResult.comps.length,12)}/12</span>

                <div style=${S.confBar(matchResult.comps.length)} />

              ${matchResult.relaxed && html`
                <div style=${{fontSize:11,color:'#D4822A'}}>

            ${error && html`<div style=${{color:'#E05252',fontSize:12,marginBottom:10}}>${error}</div>`}
            <button style=${{...S.btn,...S.btnPrimary,width:'100%',padding:'11px 0',fontSize:13}} onClick=${run} disabled=${loading}>
              ${loading ? 'Generating…' : result ? 'Re-run Estimate' : 'Generate Estimate'}
            </button>
            ${saved && html`<div style=${{color:'#3AAFA9',fontSize:12,marginTop:8,textAlign:'center'}}>✓ Saved to project</div>`}
            ${loading && html`<div style=${{color:'#6B7A94',fontSize:12,marginTop:8,textAlign:'center'}}>Analyzing ${matchResult.comps.length} comparable jobs…</div>`}
          </div>
        </div>

        <!-- RIGHT: result + history -->
        <div>

              <div style=${{fontSize:28,marginBottom:10}}>📐</div>
              <div style=${{color:'#5A6478',fontSize:13}}>Fill in details and click <strong style=${{color:'#D4822A'}}>Generate Estimate</strong>.</div>
            </div>`}

          ${result && html`
            <div>
              <div style=${S.card}>
                <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div style=${S.cardTitle}>Result</div>
                  ${result.savedAt && html`<div style=${{fontSize:11,color:'#3A4558'}}>Generated ${fmtDate(result.savedAt)}</div>`}
                </div>
                <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
                  ${[
                    {label:'Labor Hours', val:result.estHours,          range:`${result.estHoursLow}–${result.estHoursHigh} hrs`},
                    {label:'Materials',   val:fmt(result.estMaterials), range:`${fmt(result.estMaterialsLow)}–${fmt(result.estMaterialsHigh)}`},
                  ].map(s=>html`
                    <div key=${s.label} style=${{background:'#1C2127',borderRadius:6,padding:'14px 16px'}}>
                      <div style=${{fontSize:10,color:'#5A6478',letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:6}}>${s.label}</div>
                      <div style=${{fontFamily:"'IBM Plex Mono',monospace",fontSize:26,fontWeight:700,color:'#E8E4DC'}}>${s.val}</div>
                      <div style=${{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:'#5A6478',marginTop:4}}>${s.range}</div>
                    </div>`)}
                </div>
                <div style=${{marginBottom:12}}>
                  <div style=${{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style=${{fontSize:11,color:'#5A6478',textTransform:'uppercase',letterSpacing:'0.06em'}}>Confidence</span>
                    <span style=${{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:'#D4822A'}}>${result.confidence}/10</span>

                <div style=${{background:'#1C2127',borderRadius:6,padding:'12px 14px'}}>

                  <div style=${S.cardTitle}>Risk Factors</div>
                  ${result.risks.map((r,i)=>html`
                    <div key=${i} style=${{display:'flex',gap:10,padding:'7px 0',borderBottom:'1px solid #1C2127'}}>
                      <span style=${{color:'#D4822A',fontSize:11,marginTop:2,flexShrink:0}}>▲</span>

              })}

        </div>
      </div>`;

  // ── Dashboard ─────────────────────────────────────────────────────────────────
  function Dashboard({ jobs }) {
    const complete = jobs.filter(j=>j.status==='Complete');
    const avgHrVar = parseFloat(avgVariance(jobs,'Hours'));
    const totalHrs = complete.reduce((a,j)=>a+j.actHours,0);
    const totalMat = complete.reduce((a,j)=>a+j.actMaterials,0);
    return html`
      <div>
        <div style=${S.statRow}>
          ${[
            {val:complete.length,                  label:'Completed Jobs'},
            {val:totalHrs.toLocaleString()+' hrs', label:'Total Labor Hours'},
            {val:fmtFull(totalMat),                label:'Total Materials Cost'},
            {val:(avgHrVar>0?'+':'')+avgHrVar+'%', label:'Avg Labor Variance', delta:avgHrVar<=0},
          ].map((s,i)=>html`
            <div key=${i} style=${S.stat}>
              <div style=${S.statVal}>${s.val}</div>
              <div style=${S.statLabel}>${s.label}</div>
              ${'delta' in s && html`<div style=${S.statDelta(s.delta)}>${s.delta?'Under estimate ↓':'Over estimate ↑'}</div>`}
            </div>`)}
        </div>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div style=${S.card}>
            <div style=${S.cardTitle}>Labor Variance by Job Type</div>
            ${JOB_TYPES.map(type=>{
              const tj=complete.filter(j=>j.type===type); if(!tj.length) return null;
              const avgV=tj.map(j=>((j.actHours-j.estHours)/j.estHours)*100).reduce((a,b)=>a+b,0)/tj.length;
              const over=avgV>0;
              return html`
                <div key=${type} style=${{marginBottom:14}}>
                  <div style=${{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                    <span style=${{fontSize:12,color:'#B8C0CC'}}>${type}</span>
                    <span style=${{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:over?'#E05252':'#3AAFA9'}}>${over?'+':''}${avgV.toFixed(1)}%</span>
                  </div>
                  <div style=${{height:6,background:'#1C2127',borderRadius:3}}><div style=${S.varianceBar(avgV,over)} /></div>
                  <div style=${{fontSize:10,color:'#3A4558',marginTop:3}}>${tj.length} job${tj.length>1?'s':''} in history</div>
                </div>`;
            })}
          </div>
          <div style=${S.card}>
            <div style=${S.cardTitle}>Recent Jobs</div>
            ${jobs.slice(-5).reverse().map(j=>{
              const hrV=parseFloat(variance(j.estHours,j.actHours)), over=hrV>0;
              return html`
                <div key=${j.id} style=${{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #1C2127'}}>
                  <div>
                    <div style=${{fontSize:12,color:'#E8E4DC',fontWeight:500}}>${j.name}</div>
                    <div style=${{fontSize:11,color:'#5A6478',marginTop:2}}>${j.date} · ${j.sqft} sqft</div>
                  </div>
                  <div style=${{textAlign:'right'}}>
                    <div style=${{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:over?'#E05252':'#3AAFA9'}}>${over?'+':''}${hrV}% hrs</div>
                    <div style=${{...S.badge(j.status),marginTop:3}}>${j.status}</div>
                  </div>
                </div>`;
            })}
          </div>
        </div>
      </div>`;
  }

                    open && html`<tr key=${'e-'+j.id}>
                      <td colSpan=${10} style=${{...S.td,background:'#1A2028',padding:'14px 16px'}}>
                        <div style=${{fontSize:11,color:'#5A6478',letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:10,fontWeight:600}}>Edit Qualifiers</div>
                        <div style=${{display:'flex',flexWrap:'wrap',gap:12,alignItems:'flex-end'}}>
                          ${['finishLevel','demoScope','homeAge'].map(f=>html`
                            <div key=${f} style=${{minWidth:160}}>
                              <label style=${S.label}>${QUAL_LABELS[f]}</label>
                              <select style=${selectSm} value=${j[f]||''} onChange=${e=>onUpdateJob(j.id,{[f]:e.target.value||null})}>
                                <option value="">—</option>
                                ${QUALIFIER_OPTIONS[f].map(v=>html`<option key=${v} value=${v}>${v}</option>`)}
                              </select>
                            </div>`)}
                          <div style=${{minWidth:140}}>
                            <label style=${S.label}>Layout Change</label>
                            <select style=${selectSm} value=${j.layoutChange==null?'':String(j.layoutChange)}
                              onChange=${e=>onUpdateJob(j.id,{layoutChange:e.target.value===''?null:e.target.value==='true'})}>
                              <option value="">—</option>
                              <option value="true">Yes</option>
                              <option value="false">No</option>
                            </select>
                          </div>
                          ${['materialStorage','siteAccess'].map(f=>html`
                            <div key=${f} style=${{minWidth:140}}>
                              <label style=${S.label}>${QUAL_LABELS[f]}</label>
                              <select style=${selectSm} value=${j[f]||''} onChange=${e=>onUpdateJob(j.id,{[f]:e.target.value||null})}>
                                <option value="">—</option>
                                ${QUALIFIER_OPTIONS[f].map(v=>html`<option key=${v} value=${v}>${v}</option>`)}
                              </select>
                            </div>`)}
                          ${j.type==='Kitchen Remodel' && html`
                            <div style=${{minWidth:140}}>
                              <label style=${S.label}>Cabinet Type</label>
                              <select style=${selectSm} value=${j.cabinetType||''} onChange=${e=>onUpdateJob(j.id,{cabinetType:e.target.value||null})}>
                                <option value="">—</option>
                                ${QUALIFIER_OPTIONS.cabinetType.map(v=>html`<option key=${v} value=${v}>${v}</option>`)}
                              </select>
                            </div>`}
                        </div>
                      </td>
                    </tr>`,
                  ].filter(Boolean);
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;
  }

  // ── App ───────────────────────────────────────────────────────────────────────
  function routeFromHash() {
    const parts = location.hash.replace(/^#\/?/, '').split('/').filter(Boolean);
    if (parts[0] === 'projects' && parts[1]) {
      try { return { view:'project', projectId:decodeURIComponent(parts[1]) }; }
      catch (_) { return { view:'projects', projectId:null }; }
    }
    return { view:['projects','dashboard','jobs'].includes(parts[0]) ? parts[0] : 'projects', projectId:null };
  }

  function App() {
    const initialRoute = useRef(routeFromHash()).current;
    const [jobs,      setJobs]      = useState(SAMPLE_JOBS);
    const [view,      setView]      = useState(initialRoute.view);
    const [projectId, setProjectId] = useState(initialRoute.projectId);
    const updateJob   = (id, changes) => setJobs(prev => prev.map(j => j.id===id ? {...j,...changes} : j));
    const navigate = (nextView, nextProjectId=null) => {
      setView(nextView);
      setProjectId(nextProjectId);
      location.hash = nextView === 'project' ? `/projects/${encodeURIComponent(nextProjectId)}` : `/${nextView}`;
    };
    const openProject = p => navigate('project', p.projectId);
    const backToList  = () => navigate('projects');

    useEffect(() => {
      const syncRoute = () => {
        const route = routeFromHash();
        setView(route.view);
        setProjectId(route.projectId);
      };
      window.addEventListener('hashchange', syncRoute);
      return () => window.removeEventListener('hashchange', syncRoute);
    }, []);
    const navItems = [
      { id:'projects',  label:'Projects',    icon:'projects' },
      { id:'dashboard', label:'Dashboard',   icon:'dashboard' },
      { id:'jobs',      label:'Job History', icon:'jobs' },
    ];
    const titles = { projects:'Projects', dashboard:'Overview', jobs:'Job History' };
    return html`
      <div style=${S.app}>
        <div style=${S.sidebar}>
          <div style=${S.logo}>
            <div style=${S.logoText}>RHC ESTIMATING</div>
            <div style=${S.logoSub}>Contractor Tool</div>
          </div>
          <div style=${S.navSection}>Navigation</div>
          ${navItems.map(item=>html`
            <div key=${item.id} style=${S.navItem(view===item.id||(item.id==='projects'&&view==='project'))}
              onClick=${()=>{ if(item.id==='projects'){backToList();}else{navigate(item.id);} }}>
              <${Icon} name=${item.icon} size=${15} color=${view===item.id||(item.id==='projects'&&view==='project')?'#D4822A':'#4A5568'} />
              ${item.label}
            </div>`)}
          <div style=${{flex:1}} />
          <div style=${{padding:'0 20px'}}>
            <div style=${{background:'#1C2127',borderRadius:6,padding:'12px 14px'}}>
              <div style=${{fontSize:10,color:'#3A4558',marginBottom:4,letterSpacing:'0.08em',textTransform:'uppercase'}}>Sample Jobs</div>
              <div style=${{fontFamily:"'IBM Plex Mono',monospace",fontSize:18,color:'#D4822A',fontWeight:600}}>${jobs.length}</div>
              <div style=${{fontSize:10,color:'#3A4558',marginTop:2}}>${jobs.filter(j=>j.status==='Complete').length} complete</div>
            </div>
          </div>
        </div>
        <div style=${S.main}>
          <div style=${S.topbar}>
            <div style=${S.pageTitle}>${view==='project'?'':titles[view]}</div>
          </div>
          <div style=${S.content}>
            ${view==='projects'  && html`<${ProjectsList} onOpen=${openProject} />`}
            ${view==='project'   && html`<${ProjectDetail} projectId=${projectId} onBack=${backToList} jobs=${jobs} />`}
            ${view==='dashboard' && html`<${Dashboard} jobs=${jobs} />`}
            ${view==='jobs'      && html`<${JobsTable} jobs=${jobs} onUpdateJob=${updateJob} />`}
          </div>
        </div>
      </div>`;
  }

  createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
